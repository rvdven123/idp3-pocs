apiVersion: apps.gitlab.com/v1beta1
kind: GitLab
metadata:
  name: gitlab
  namespace: gitlab-system
spec:
  chart:
    version: "9.11.0" # https://gitlab.com/gitlab-org/cloud-native/gitlab-operator/-/blob/<OPERATOR_VERSION>/CHART_VERSIONS
    values:
      global:
        hosts:
          domain: javee.nl # use a real domain here
          hostPrefix: gitlab
        ingress:
          configureCertmanager: true
      certmanager-issuer:
        email: r.van.de.ven@javee.nl # use your real email address here