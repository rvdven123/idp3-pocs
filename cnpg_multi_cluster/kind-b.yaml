kind: Cluster
apiVersion: kind.x-k8s.io/v1alpha4
networking:
  apiServerAddress: "127.0.0.1"
  podSubnet: "10.20.0.0/16"
  serviceSubnet: "10.120.0.0/16"
kubeadmConfigPatches:
- |
  kind: ClusterConfiguration
  apiServer:
    certSANs:
    - "a-control-plane"
    - "b-control-plane"  
nodes:
  - role: control-plane
    extraPortMappings:
      - containerPort: 80
        hostPort: 6080
        protocol: TCP
      - containerPort: 443
        hostPort: 6443
        protocol: TCP
      - containerPort: 5432
        hostPort: 6432
        protocol: TCP  